# Client suite — Next.js web app (@devdigest/web).
# Typecheck + component/unit tests (vitest + jsdom). Hermetic: no API, no DB,
# no browser — fetch is mocked in the tests. The full-stack browser flow lives
# in e2e-web.yml.
name: client

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'
  pull_request:
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'

permissions:
  contents: read

concurrency:
  group: client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile || pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test
