# Harness evals — gates changes to the Claude Code artifacts (.claude/**, CLAUDE.md) by CHANGE SOURCE.
#
# A single `detect` job runs evals/scripts/ci-detect.mjs over the PR diff and maps changed files onto
# the eval suites that must run:
#
#   .claude/skills/<name>/**  →  scoped `vitest run skills/<name>`   (content tier, no proxy)
#   .claude/agents/<name>.md  →  scoped `vitest run agents/<name>`   (tool tier, LiteLLM proxy) + workflow tier
#   CLAUDE.md / any agent / engine change  →  the workflow tier
#
# The detector emits `skills` / `agents` as JSON arrays that feed the matrices below directly, plus
# `skipped_*` for changed artifacts that have NO eval suite (soft-skip: reported, never red).
#
# Backend: OpenRouter (EVAL_BACKEND=openrouter). Content tiers hit OpenRouter natively; the tool tiers
# run inside the Claude Agent SDK and need the bundled LiteLLM translating proxy (evals/proxy/).
# Put the key in the repo's Actions secrets as OPENROUTER_API_KEY.
name: evals

on:
  pull_request:
    paths:
      - '.claude/**'
      - 'CLAUDE.md'
      - 'evals/**'
  workflow_dispatch:
    inputs:
      eval_model:
        description: 'Model under test (OpenRouter slug). Blank = use the EVAL_MODEL repo variable / default.'
        required: false
        type: string
      eval_judge_model:
        description: 'Judge model (OpenRouter slug). Blank = use the EVAL_JUDGE_MODEL repo variable / default.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

env:
  # Model selection precedence: manual-run input → repo/environment Variable → hardcoded default.
  # Set the Variable in Settings → Secrets and variables → Actions → Variables (or `gh variable set`)
  # to change the model WITHOUT editing this file. The evals are calibrated against Anthropic-class
  # models, so that is the default; the tool tiers route through the LiteLLM proxy either way.
  EVAL_MODEL: ${{ inputs.eval_model || vars.EVAL_MODEL || 'anthropic/claude-haiku-4.5' }}
  EVAL_JUDGE_MODEL: ${{ inputs.eval_judge_model || vars.EVAL_JUDGE_MODEL || 'anthropic/claude-haiku-4.5' }}

jobs:
  # ── 1. Change detection ─────────────────────────────────────────────────────────────────────────
  # Pure node, no deps. Diffs the PR against its base and maps the changed files onto eval suites.
  detect:
    name: detect
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.detect.outputs.skills }}
      agents: ${{ steps.detect.outputs.agents }}
      run_workflow: ${{ steps.detect.outputs.run_workflow }}
      skipped_skills: ${{ steps.detect.outputs.skipped_skills }}
      skipped_agents: ${{ steps.detect.outputs.skipped_agents }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need both base and head commits to diff
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: detect
        working-directory: evals
        env:
          # On pull_request both SHAs are in history thanks to fetch-depth:0; on manual dispatch fall
          # back to the previous commit so the detector still has something to map.
          BASE_SHA: ${{ github.event.pull_request.base.sha || format('{0}^', github.sha) }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          export CHANGED_FILES
          node scripts/ci-detect.mjs
      - name: Summary
        if: always()
        run: |
          {
            echo "### Eval change detection"
            echo ""
            echo "| tier | selection |"
            echo "|------|-----------|"
            echo "| skills → run | \`${{ steps.detect.outputs.skills }}\` |"
            echo "| agents → run | \`${{ steps.detect.outputs.agents }}\` |"
            echo "| workflow tier | ${{ steps.detect.outputs.run_workflow }} |"
            echo "| skipped skills (no evals) | ${{ steps.detect.outputs.skipped_skills || '—' }} |"
            echo "| skipped agents (no evals) | ${{ steps.detect.outputs.skipped_agents || '—' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 2. Static quality gate (required, deterministic) ────────────────────────────────────────────
  # No model, no network, no secret. Runs whenever ANY skill changed — including ones with no eval
  # suite — because the SKILL.md structure/link checks are the cheap always-on gate.
  quality:
    name: skill quality (static)
    needs: detect
    if: needs.detect.outputs.skills != '[]' || needs.detect.outputs.skipped_skills != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evals
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: evals/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm eval:quality

  # ── 3. Skill evals (content tier — native OpenRouter, no proxy) ─────────────────────────────────
  # One matrix leg per changed skill that HAS an eval suite. Blocking.
  skill-evals:
    name: skill eval (${{ matrix.name }})
    needs: detect
    if: needs.detect.outputs.skills != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        name: ${{ fromJSON(needs.detect.outputs.skills) }}
    defaults:
      run:
        working-directory: evals
    env:
      EVAL_BACKEND: openrouter
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: evals/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run skills/${{ matrix.name }}

  # ── 4. Agent evals (tool tier — Agent SDK via the LiteLLM proxy) ────────────────────────────────
  # One matrix leg per changed agent that HAS an eval suite. Serialized (max-parallel:1) to stay under
  # OpenRouter rate limits — the tool tiers degrade to a single turn when throttled. Blocking.
  agent-evals:
    name: agent eval (${{ matrix.name }})
    needs: detect
    if: needs.detect.outputs.agents != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        name: ${{ fromJSON(needs.detect.outputs.agents) }}
    defaults:
      run:
        working-directory: evals
    env:
      EVAL_BACKEND: openrouter
      OPENROUTER_BASE_URL: http://localhost:4000 # route the SDK's Anthropic protocol through the proxy
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: evals/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: docker compose -f proxy/docker-compose.yml up -d # reads OPENROUTER_API_KEY from job env
      - run: pnpm proxy:wait
      - run: pnpm exec vitest run agents/${{ matrix.name }}
      - if: failure()
        run: docker compose -f proxy/docker-compose.yml logs --tail 100
      - if: always()
        run: docker compose -f proxy/docker-compose.yml down

  # ── 5. Required gate (the ONLY check to mark required in branch protection) ─────────────────────
  # Always runs, so it always posts a status — avoiding the "waiting for a required check that was
  # skipped" merge deadlock that conditional + matrix jobs otherwise cause. Passes when every blocking
  # job SUCCEEDED or was legitimately SKIPPED; fails if any of them failed or was cancelled. The
  # advisory `workflow-evals` job is intentionally excluded.
  evals-gate:
    name: evals-gate
    needs: [detect, quality, skill-evals, agent-evals]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check required eval jobs
        env:
          DETECT: ${{ needs.detect.result }}
          QUALITY: ${{ needs.quality.result }}
          SKILLS: ${{ needs.skill-evals.result }}
          AGENTS: ${{ needs.agent-evals.result }}
        run: |
          echo "detect=$DETECT quality=$QUALITY skill-evals=$SKILLS agent-evals=$AGENTS"
          # detect MUST succeed — if it errored, the others were skipped and would mask the failure.
          if [ "$DETECT" != "success" ]; then
            echo "::error::detect job did not succeed ($DETECT)"; exit 1
          fi
          # The eval jobs may be 'skipped' (nothing of that kind changed) — that is a pass.
          for r in "$QUALITY" "$SKILLS" "$AGENTS"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::a required eval job did not pass ($r)"; exit 1
            fi
          done
          echo "All required eval jobs passed or were skipped."

  # ── 6. Workflow tier (tool tier — non-blocking) ─────────────────────────────────────────────────
  # Measures the LIVE routing harness. Triggered by any CLAUDE.md / agent / engine change. Marked
  # continue-on-error because its `activation` cases are behaviour-shaped and documented-flaky on
  # non-Anthropic models (evals/README) — advisory, not merge-blocking.
  workflow-evals:
    name: workflow eval (advisory)
    needs: detect
    if: needs.detect.outputs.run_workflow == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: evals
    env:
      EVAL_BACKEND: openrouter
      OPENROUTER_BASE_URL: http://localhost:4000
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: evals/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: docker compose -f proxy/docker-compose.yml up -d
      - run: pnpm proxy:wait
      - run: pnpm eval:workflow
      - if: failure()
        run: docker compose -f proxy/docker-compose.yml logs --tail 100
      - if: always()
        run: docker compose -f proxy/docker-compose.yml down
